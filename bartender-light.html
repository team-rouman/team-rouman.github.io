<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Bartender's Guide — Est. 1998</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0ea;
    --surface: #ffffff;
    --surface-2: #faf7f3;
    --amber: #b07830;
    --amber-dim: #c8943a;
    --amber-faint: rgba(160,100,30,0.08);
    --amber-border: rgba(160,110,40,0.18);
    --text: #2a1f10;
    --text-dim: #6b4e28;
    --text-muted: #9a7a50;
    --text-ghost: #c8a878;
    --sidebar-bg: #fdf9f4;
    --header-bg: #ffffff;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Comic Sans MS', 'Comic Sans', cursive; overflow: hidden; }

  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(200,150,60,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(180,120,40,0.04) 0%, transparent 50%);
  }

  /* LAYOUT */
  #app { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100vh; }

  header {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 15px 28px;
    background: var(--header-bg);
    border-bottom: 1px solid var(--amber-border);
    box-shadow: 0 1px 4px rgba(100,60,10,0.06);
  }

  .header-left { display: flex; align-items: baseline; gap: 14px; }
  .header-est { font-size: 10px; letter-spacing: 0.38em; color: #b89060; text-transform: uppercase; }
  .header-title { font-size: 26px; font-weight: normal; color: var(--amber); letter-spacing: 0.06em; }

  .header-right { display: flex; align-items: center; gap: 18px; }
  #surprise-btn {
    background: rgba(160,100,30,0.08); border: 1px solid rgba(160,100,30,0.22);
    color: var(--amber); padding: 6px 14px; border-radius: 4px; cursor: pointer;
    font-size: 11px; font-family: inherit; letter-spacing: 0.12em; text-transform: uppercase;
    transition: filter 0.15s, background 0.15s;
  }
  #surprise-btn:hover { background: rgba(160,100,30,0.14); filter: brightness(0.9); }
  #clock { font-size: 12px; color: #b89060; font-variant-numeric: tabular-nums; letter-spacing: 0.1em; }

  .body-wrap { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  aside {
    width: 212px; flex-shrink: 0;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--amber-border);
    display: flex; flex-direction: column;
    overflow-y: auto;
  }

  .search-wrap { padding: 16px 13px 10px; }
  #search {
    width: 100%;
    background: #fff; border: 1px solid rgba(160,110,40,0.22);
    border-radius: 3px; padding: 7px 10px;
    color: var(--text-dim); font-size: 12px; font-family: inherit; outline: none;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: rgba(160,100,30,0.45); }
  #search::placeholder { color: #c8a878; }

  .cat-label { padding: 2px 13px 7px; font-size: 8.5px; letter-spacing: 0.42em; color: #c0a070; text-transform: uppercase; }

  .cat-btn {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 15px; width: 100%;
    background: transparent; border: none; border-left: 2px solid transparent;
    color: var(--text-muted); cursor: pointer;
    font-size: 12px; font-family: inherit; text-align: left;
    transition: all 0.18s;
  }
  .cat-btn:hover { background: rgba(160,100,30,0.05); color: var(--text-dim); }
  .cat-btn.active { background: rgba(160,100,30,0.09); color: var(--amber); }
  .cat-btn-inner { display: flex; align-items: center; gap: 9px; }
  .cat-emoji { font-size: 15px; }
  .cat-count { font-size: 10px; color: #c8a878; }
  .cat-btn.active .cat-count { color: #b07830; }

  .sidebar-footer { margin-top: auto; padding: 15px 13px; border-top: 1px solid var(--amber-border); }
  .sidebar-footer p { font-size: 10px; color: #c0a070; line-height: 1.7; letter-spacing: 0.03em; }

  /* MAIN */
  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  #list-section {
    padding: 17px 22px 14px;
    border-bottom: 1px solid rgba(160,110,40,0.1);
    overflow-y: auto;
    transition: max-height 0.3s ease;
  }
  #list-section.has-detail { max-height: 44%; }
  #list-section.no-detail { max-height: 100%; }

  .list-heading { margin-bottom: 11px; font-size: 10px; letter-spacing: 0.4em; color: #c8a878; text-transform: uppercase; font-weight: normal; font-family: inherit; }

  #drink-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(172px, 1fr)); gap: 5px; }

  .drink-btn {
    display: flex; align-items: center; gap: 8px; padding: 7px 9px;
    background: #fff; border: 1px solid rgba(160,110,40,0.14);
    border-radius: 4px; color: var(--text-muted); cursor: pointer;
    font-size: 12px; font-family: inherit; text-align: left;
    transition: all 0.15s; animation: fadeIn 0.22s ease both;
    box-shadow: 0 1px 2px rgba(100,60,10,0.04);
  }
  .drink-btn:hover { border-color: rgba(160,100,30,0.3); color: var(--text-dim); box-shadow: 0 2px 6px rgba(100,60,10,0.08); }
  .drink-btn.selected { background: rgba(160,100,30,0.07); border-color: rgba(160,100,30,0.3); color: var(--amber); }
  .drink-btn .glass-icon { color: #d0b080; flex-shrink: 0; }
  .drink-btn.selected .glass-icon { color: var(--amber); }
  .drink-btn span.name { line-height: 1.3; }

  /* DETAIL */
  #detail-section {
    flex: 1; padding: 22px 28px 34px; overflow-y: auto;
    background: linear-gradient(180deg, rgba(250,245,238,0.8) 0%, transparent 100%);
    opacity: 1; transform: translateY(0); transition: opacity 0.25s, transform 0.25s;
  }
  #detail-section.animating { opacity: 0; transform: translateY(5px); }

  #empty-state {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: #d0b888; font-size: 13px; font-style: italic; letter-spacing: 0.06em;
  }

  .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .divider-line { height: 1px; flex: 1; }
  .divider-line.left { background: linear-gradient(90deg, transparent, rgba(160,100,30,0.25)); }
  .divider-line.right { background: linear-gradient(90deg, rgba(160,100,30,0.25), transparent); }
  .divider-gem { color: #c8a060; font-size: 15px; }

  .detail-inner { display: flex; gap: 30px; flex-wrap: wrap; }
  .detail-glass { flex-shrink: 0; color: #b07830; filter: drop-shadow(0 2px 6px rgba(150,100,20,0.15)); padding-top: 2px; }

  .detail-body { flex: 1; min-width: 200px; }
  .detail-name { font-size: 28px; font-weight: normal; color: #8a5820; letter-spacing: 0.04em; margin-bottom: 3px; }
  .detail-cat { font-size: 9px; letter-spacing: 0.34em; color: #c0a070; text-transform: uppercase; margin-bottom: 16px; }

  .detail-cols { display: flex; gap: 34px; flex-wrap: wrap; }

  .detail-col h3 { margin-bottom: 8px; font-size: 8.5px; letter-spacing: 0.44em; color: #b09060; text-transform: uppercase; font-weight: normal; }
  .ingredients { min-width: 170px; }
  .ingredients ul { list-style: none; }
  .ingredients li { display: flex; align-items: flex-start; gap: 7px; padding: 3.5px 0; font-size: 13px; color: var(--text-dim); border-bottom: 1px solid rgba(160,110,40,0.1); }
  .ingredients li:last-child { border-bottom: none; }
  .ing-dot { color: #d0a060; font-size: 8px; margin-top: 4px; flex-shrink: 0; }

  .instructions { max-width: 340px; flex: 1; }
  .instructions p { font-size: 14px; color: var(--text-muted); line-height: 1.8; font-style: italic; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d8c0a0; border-radius: 2px; }
  * { scrollbar-width: thin; scrollbar-color: #d8c0a0 transparent; }

  @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-left">
      <span class="header-est">Est. 1998</span>
      <h1 class="header-title">The Bartender's Guide</h1>
    </div>
    <div class="header-right">
      <button id="surprise-btn">Surprise Me</button>
      <span id="clock"></span>
    </div>
  </header>

  <div class="body-wrap">
    <aside id="sidebar">
      <div class="search-wrap">
        <input type="text" id="search" placeholder="Search all recipes…" autocomplete="off">
      </div>
      <div class="cat-label">Categories</div>
      <div id="cat-list"></div>
      <div class="sidebar-footer">
        <p id="recipe-count"></p>
      </div>
    </aside>

    <main>
      <div id="list-section" class="no-detail">
        <div class="list-heading" id="list-heading"></div>
        <div id="drink-grid"></div>
      </div>
      <div id="detail-section" style="display:none"></div>
      <div id="empty-state">Select a drink above, or try "Surprise Me"</div>
    </main>
  </div>
</div>

// SVG glass paths
const GLASS_SVG = {
  shot: `<path d="M10 4 L14 30 L6 30 Z" fill="rgba(160,100,30,0.1)" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>`,
  mug: `<rect x="4" y="6" width="16" height="22" rx="1.5" fill="rgba(160,100,30,0.08)" stroke="currentColor" stroke-width="1.3"/><path d="M20 10 Q26 12 26 18 Q26 23 20 23" fill="none" stroke="currentColor" stroke-width="1.3"/>`,
  cocktail: `<path d="M3 3 L13 18 L13 28 L9 28 L9 30 L17 30 L17 28 L13 28 L13 18 L23 3 Z" fill="rgba(160,100,30,0.08)" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>`,
  rocks: `<path d="M5 8 L7 30 L19 30 L21 8 Z" fill="rgba(160,100,30,0.08)" stroke="currentColor" stroke-width="1.3"/>`,
  highball: `<rect x="6" y="3" width="13" height="28" rx="1" fill="rgba(160,100,30,0.08)" stroke="currentColor" stroke-width="1.3"/>`,
  wine: `<path d="M7 3 Q3 14 7 20 L9 28 L7 30 L19 30 L17 28 L19 20 Q23 14 19 3 Z" fill="rgba(160,100,30,0.08)" stroke="currentColor" stroke-width="1.3"/>`,
  julep: `<path d="M5 3 L7 30 L19 30 L21 3 Z" fill="rgba(160,100,30,0.08)" stroke="currentColor" stroke-width="1.3"/>`,
  punch: `<path d="M3 8 Q3 28 13 28 Q23 28 23 8 Z" fill="rgba(160,100,30,0.08)" stroke="currentColor" stroke-width="1.3"/><line x1="7" y1="4" x2="19" y2="4" stroke="currentColor" stroke-width="1.3"/>`,
};

function glassSVG(type, size) {
  const w = Math.round(size * 0.75), h = size;
  const shape = GLASS_SVG[type] || GLASS_SVG.rocks;
  return `<svg viewBox="0 0 26 34" width="${w}" height="${h}" style="display:block">${shape}</svg>`;
}

// State
let activeCategory = 'shots';
let selectedDrink = null;
let searchQuery = '';

const allDrinks = Object.entries(DRINKS).flatMap(([cat, data]) =>
  data.items.map(d => ({ ...d, category: cat }))
);

// Clock
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
}
updateClock();
setInterval(updateClock, 1000);

// Build sidebar categories
function buildSidebar() {
  const list = document.getElementById('cat-list');
  list.innerHTML = Object.entries(DRINKS).map(([key, data]) => `
    <button class="cat-btn${key === activeCategory ? ' active' : ''}" data-cat="${key}"
      style="border-left-color: ${key === activeCategory && !searchQuery ? data.color : 'transparent'}">
      <span class="cat-btn-inner">
        <span class="cat-emoji">${data.emoji}</span>
        <span>${data.label}</span>
      </span>
      <span class="cat-count">${data.items.length}</span>
    </button>
  `).join('');
  document.getElementById('recipe-count').innerHTML = `${allDrinks.length} recipes<br>Restored from 1998 .exe`;
}

// Build drink grid
function buildGrid() {
  const list = searchQuery.trim()
    ? allDrinks.filter(d =>
        d.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
        d.ingredients.some(i => i.toLowerCase().includes(searchQuery.toLowerCase()))
      )
    : DRINKS[activeCategory].items.map(d => ({ ...d, category: activeCategory }));

  const heading = document.getElementById('list-heading');
  heading.textContent = searchQuery
    ? `${list.length} result${list.length !== 1 ? 's' : ''} for "${searchQuery}"`
    : DRINKS[activeCategory].label;

  const grid = document.getElementById('drink-grid');
  grid.innerHTML = list.map((drink, i) => {
    const isSel = selectedDrink && selectedDrink.name === drink.name;
    return `<button class="drink-btn${isSel ? ' selected' : ''}"
      style="animation-delay:${Math.min(i * 0.014, 0.4)}s"
      data-name="${escapeAttr(drink.name)}" data-cat="${drink.category}">
      <span class="glass-icon">${glassSVG(drink.glass, 17)}</span>
      <span class="name">${esc(drink.name)}</span>
    </button>`;
  }).join('');
}

// Show detail panel
function showDetail(drink) {
  const section = document.getElementById('detail-section');
  const empty = document.getElementById('empty-state');
  const listSection = document.getElementById('list-section');

  section.classList.add('animating');
  section.style.display = 'block';
  empty.style.display = 'none';
  listSection.className = 'has-detail';

  setTimeout(() => {
    section.innerHTML = `
      <div class="divider">
        <div class="divider-line left"></div>
        <span class="divider-gem">⟡</span>
        <div class="divider-line right"></div>
      </div>
      <div class="detail-inner">
        <div class="detail-glass">${glassSVG(drink.glass, 60)}</div>
        <div class="detail-body">
          <div class="detail-name">${esc(drink.name)}</div>
          <div class="detail-cat">${esc(DRINKS[drink.category]?.label || '')}</div>
          <div class="detail-cols">
            <div class="detail-col ingredients">
              <h3>Ingredients</h3>
              <ul>${drink.ingredients.map(ing => `
                <li><span class="ing-dot">◆</span>${esc(ing)}</li>
              `).join('')}</ul>
            </div>
            <div class="detail-col instructions">
              <h3>Instructions</h3>
              <p>${esc(drink.instructions)}</p>
            </div>
          </div>
        </div>
      </div>
    `;
    section.classList.remove('animating');
  }, 30);
}

function hideDetail() {
  document.getElementById('detail-section').style.display = 'none';
  document.getElementById('empty-state').style.display = 'flex';
  document.getElementById('list-section').className = 'no-detail';
}

// Render all
function render() {
  buildSidebar();
  buildGrid();
  if (selectedDrink) showDetail(selectedDrink);
}

// Escape helpers
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeAttr(str) {
  return String(str).replace(/"/g,'&quot;');
}

// Events
document.getElementById('cat-list').addEventListener('click', e => {
  const btn = e.target.closest('.cat-btn');
  if (!btn) return;
  activeCategory = btn.dataset.cat;
  selectedDrink = null;
  searchQuery = '';
  document.getElementById('search').value = '';
  hideDetail();
  render();
});

document.getElementById('drink-grid').addEventListener('click', e => {
  const btn = e.target.closest('.drink-btn');
  if (!btn) return;
  const name = btn.dataset.name;
  const cat = btn.dataset.cat;
  const drink = DRINKS[cat]?.items.find(d => d.name === name);
  if (!drink) return;
  selectedDrink = { ...drink, category: cat };
  buildGrid();
  showDetail(selectedDrink);
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  selectedDrink = null;
  hideDetail();
  buildSidebar();
  buildGrid();
});

document.getElementById('surprise-btn').addEventListener('click', () => {
  const drink = allDrinks[Math.floor(Math.random() * allDrinks.length)];
  selectedDrink = drink;
  activeCategory = drink.category;
  searchQuery = '';
  document.getElementById('search').value = '';
  render();
  showDetail(selectedDrink);
});

// Init
render();
</script>
